<html>
<head>
    <title>Array Sorting Descending</title>
</head>
<body>
    <center>
        <font size="50px">
            <div id="array"></div>
            <button onclick="sort()">sort</button>
        </font>
    </center>
    <script>
        const arr = [2, 1, 3, 5, 0];
        const a = document.getElementById("array");
        a.innerHTML = arr
        function sort() {
            a.innerHTML = arr.sort().reverse();
        }
    </script>
</body>
</html>
