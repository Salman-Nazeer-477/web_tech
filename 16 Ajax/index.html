<html>
<head>
  <title>Retrieve Date with AJAX</title>
</head>
<body>
  <h1>AJAX Date Retrieval</h1>
  <button onclick="loadDate()">Load Date</button>
  <div id="dateDisplay"></div>

  <script>
    function loadDate() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          document.getElementById("dateDisplay").innerText = "Date from : " + this.responseText;
        }
      };
      xhttp.open("GET", "date.txt",true);
      xhttp.send();
    }
  </script>
</body>
</html>
